services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hlagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hlagent}
      POSTGRES_DB: ${POSTGRES_DB:-hlagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hlagent} -d ${POSTGRES_DB:-hlagent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault:
    profiles: ["vault"]
    image: hashicorp/vault:${VAULT_IMAGE_TAG:-2.0.3}
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://127.0.0.1:8200
    command: server
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    volumes:
      - vault_data:/vault/file
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 12

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
    command: sh -c "alembic upgrade head && hyperliquid-trading-agent"
    ports:
      - "${HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    profiles: ["dashboard"]
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      RUNTIME_PROFILE: dashboard_only
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      DISCORD_BOT_TOKEN: ""
      TRADFI_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      NEWSWIRE_ENABLED: "false"
      HIP4_ENABLED: "false"
      HIP4_SCAN_ENABLED: "false"
      HIP4_PAPER_EXECUTION_ENABLED: "false"
      HIP4_MANUAL_TICKET_EXPORT_ENABLED: "false"
      HIP4_PROACTIVE_LOOP_ENABLED: "false"
      HIP4_PROACTIVE_PAPER_EXECUTION_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      WORLD_MODEL_DEV_SEED_ENABLED: "true"
    command: sh -c "alembic upgrade head && hyperliquid-trading-agent"
    ports:
      - "${DASHBOARD_HOST_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  world-model-live:
    profiles: ["world-model-live"]
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      RUNTIME_PROFILE: world_model_live
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_DISCORD_ENABLED: "true"
      TRADFI_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      HIP4_ENABLED: "false"
      HIP4_SCAN_ENABLED: "false"
      HIP4_PAPER_EXECUTION_ENABLED: "false"
      HIP4_MANUAL_TICKET_EXPORT_ENABLED: "false"
      HIP4_PROACTIVE_LOOP_ENABLED: "false"
      HIP4_PROACTIVE_PAPER_EXECUTION_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      NEWSWIRE_ENABLED: "true"
      WORLD_MODEL_STREAMS_ENABLED: "true"
      WORLD_MODEL_POLYMARKET_WS_ENABLED: "true"
    command: sh -c "alembic upgrade head && hyperliquid-trading-agent"
    ports:
      - "${WORLD_MODEL_LIVE_HOST_PORT:-8091}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  vault_data:
