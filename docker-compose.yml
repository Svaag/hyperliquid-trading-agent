x-app-common: &app-common
  build: .
  restart: unless-stopped
  env_file:
    - path: .env
      required: false
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hlagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hlagent}
      POSTGRES_DB: ${POSTGRES_DB:-hlagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hlagent} -d ${POSTGRES_DB:-hlagent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault:
    profiles: ["vault"]
    image: hashicorp/vault:${VAULT_IMAGE_TAG:-2.0.3}
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://127.0.0.1:8200
    command: server
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    volumes:
      - vault_data:/vault/file
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build: .
    restart: "no"
    env_file:
      - path: .env
        required: false
    environment:
      SERVICE_ROLE: api
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "false"
      WORLD_MODEL_ADAPTERS_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      ORCHESTRATION_WAVE_SUPERVISOR_ENABLED: "false"
      LIQUIDATIONS_ENABLED: "false"
      TRADFI_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-common
    environment:
      SERVICE_ROLE: api
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "false"
      WORLD_MODEL_ADAPTERS_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      ORCHESTRATION_WAVE_SUPERVISOR_ENABLED: "false"
      LIQUIDATIONS_ENABLED: "false"
      TRADFI_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: hyperliquid-trading-agent
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1}:${HOST_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5

  newswire:
    <<: *app-common
    environment:
      SERVICE_ROLE: newswire
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "true"
      WORLD_MODEL_STREAMS_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime newswire

  world-model:
    <<: *app-common
    environment:
      SERVICE_ROLE: world_model
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "${WORLD_MODEL_STREAMS_ENABLED:-true}"
      WORLD_MODEL_POLYMARKET_WS_ENABLED: "${WORLD_MODEL_POLYMARKET_WS_ENABLED:-true}"
    command: hyperliquid-trading-agent-runtime world_model

  trader:
    <<: *app-common
    environment:
      SERVICE_ROLE: trader
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "${ENGINE_PNL_ATTRIBUTION_ENABLED:-true}"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime trader

  agent:
    <<: *app-common
    environment:
      SERVICE_ROLE: agent
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime agent

  discord-publisher:
    profiles: ["discord-publisher"]
    <<: *app-common
    environment:
      SERVICE_ROLE: discord_publisher
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      DISCORD_PUBLISHER_ENABLED: "true"
      NEWSWIRE_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime discord_publisher

  discord-bot:
    profiles: ["discord-bot"]
    <<: *app-common
    environment:
      SERVICE_ROLE: discord_bot
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      DISCORD_BOT_ENABLED: "true"
      DISCORD_CHART_COMMAND_ENABLED: "true"
      TRADFI_ENABLED: "true"
      ALPHA_VANTAGE_ENABLED: "true"
      NEWSWIRE_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime discord_bot

  liquidations:
    profiles: ["liquidations"]
    <<: *app-common
    environment:
      SERVICE_ROLE: liquidations
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      LIQUIDATIONS_ENABLED: "true"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime liquidations

  scheduler:
    <<: *app-common
    environment:
      SERVICE_ROLE: scheduler
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "false"
      WORLD_MODEL_ADAPTERS_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      ORCHESTRATION_WAVE_SUPERVISOR_ENABLED: "true"
      LIQUIDATIONS_ENABLED: "false"
      TRADFI_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: hyperliquid-trading-agent-runtime scheduler

  bot:
    profiles: ["legacy"]
    <<: *app-common
    environment:
      SERVICE_ROLE: api
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "false"
      WORLD_MODEL_ADAPTERS_ENABLED: "false"
      ENGINE_ENABLED: "false"
      ENGINE_PNL_ATTRIBUTION_ENABLED: "false"
      POSITION_TRACKING_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      ORCHESTRATION_WAVE_SUPERVISOR_ENABLED: "false"
      LIQUIDATIONS_ENABLED: "false"
      TRADFI_ENABLED: "false"
      HYPERLIQUID_WS_ENABLED: "false"
      DISCORD_BOT_ENABLED: "false"
      DISCORD_PUBLISHER_ENABLED: "false"
    command: hyperliquid-trading-agent

  world-model-live:
    profiles: ["legacy-world-model-live"]
    <<: *app-common
    environment:
      SERVICE_ROLE: world_model
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hlagent}:${POSTGRES_PASSWORD:-hlagent}@postgres:5432/${POSTGRES_DB:-hlagent}
      NEWSWIRE_ENABLED: "false"
      ENGINE_ENABLED: "false"
      AUTONOMY_ENABLED: "false"
      HIP4_ENABLED: "false"
      WORLD_MODEL_STREAMS_ENABLED: "${WORLD_MODEL_STREAMS_ENABLED:-true}"
      WORLD_MODEL_POLYMARKET_WS_ENABLED: "${WORLD_MODEL_POLYMARKET_WS_ENABLED:-true}"
    command: hyperliquid-trading-agent-runtime world_model

volumes:
  postgres_data:
  vault_data:
